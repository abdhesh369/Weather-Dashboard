name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server deps
        run: cd server && npm ci

      - name: Run server tests
        run: cd server && npm test
        env:
          MONGO_URI: ${{ secrets.MONGO_URI_TEST || 'mongodb://localhost:27017/skycast_test' }}
          JWT_SECRET: test_jwt_secret_ci_value_32chars_min
          REFRESH_TOKEN_SECRET: test_refresh_secret_ci_value_32chars
          WEATHER_API_KEY: test_key
          NODE_ENV: test

  build-client:
    name: Build Client
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client deps
        run: cd client && npm ci

      - name: Build
        run: cd client && npm run build
        env:
          VITE_API_URL: ''
